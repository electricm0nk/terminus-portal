# CI — Build, Test, Push
#
# Branch protection: configure in GitHub → Settings → Branches → Require status checks: "test"
# This ensures no PR can merge to main if tests fail (AC #4).
#
# Registry: ghcr.io/electricm0nk/terminus-portal
# Sidecar registry: ghcr.io/electricm0nk/terminus-portal-sidecar
# Auth: GITHUB_TOKEN (permissions.packages: write — no PAT needed for same-org pushes)

name: CI

on:
  push:
    branches: [main, develop, 'feature/portal4']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  # Job 1: Run tests — MUST pass before build (AC #1, NFR1 TDD discipline)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Job 2: Build and push Docker image (only on main merge, after tests pass)
  build-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=ghcr.io/electricm0nk/terminus-portal:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "sha_short_tag=ghcr.io/electricm0nk/terminus-portal:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=ghcr.io/electricm0nk/terminus-portal:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # AC #2: full SHA tag; AC #3: latest tag for ArgoCD
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.sha_short_tag }}
            ${{ steps.meta.outputs.latest_tag }}

      - name: Release summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SHA tag** | \`${{ steps.meta.outputs.sha_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Latest tag** | \`${{ steps.meta.outputs.latest_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # Job 3: Build and push sidecar image (portal4 story 2-02)
  # Builds the Go sidecar from sidecar/Dockerfile.
  # Triggers on main merge and feature/portal4 pushes.
  # Does NOT depend on the JS test job — sidecar is a separate build context.
  build-push-sidecar:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/feature/portal4')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set sidecar image tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=ghcr.io/electricm0nk/terminus-portal-sidecar:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "sha_short_tag=ghcr.io/electricm0nk/terminus-portal-sidecar:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=ghcr.io/electricm0nk/terminus-portal-sidecar:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push sidecar image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./sidecar
          file: ./sidecar/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.sha_short_tag }}
            ${{ steps.meta.outputs.latest_tag }}

      - name: Sidecar release summary
        run: |
          echo "## Sidecar Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SHA tag** | \`${{ steps.meta.outputs.sha_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Latest tag** | \`${{ steps.meta.outputs.latest_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
