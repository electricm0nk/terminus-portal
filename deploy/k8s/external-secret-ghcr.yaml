apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: terminus-portal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {"auths":{"ghcr.io":{"username":"electricm0nk","password":"{{ .token }}","auth":"{{ list "electricm0nk" .token | join ":" | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: secret/terminus/default/ghcr/pull-token
        property: token
