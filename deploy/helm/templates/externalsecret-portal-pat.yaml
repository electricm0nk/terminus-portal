{{- /*
externalsecret-portal-pat.yaml
ESO ExternalSecret — pulls GITHUB_PAT from Vault and materialises it as a
k8s Secret consumed by the portal-sidecar container (via envFrom / secretKeyRef).

Vault path:  secret/terminus/github   property: Portal_PAT
k8s Secret:  portal-github-pat        key:      GITHUB_PAT
ClusterSecretStore: vault-backend (shared store — see deploy/k8s/external-secret-ghcr.yaml)

NOTE: The secret value is NEVER logged or echoed in any container.
*/ -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: portal-github-pat
  namespace: terminus-portal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    {{- include "terminus-portal.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: portal-github-pat
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_PAT
      remoteRef:
        key: secret/terminus/github
        property: Portal_PAT
