{{- /*
serviceaccount-rbac.yaml
ServiceAccount, ClusterRole, and ClusterRoleBinding for the portal-sidecar.

Principal: portal-sidecar-sa (terminus-portal namespace)
Permitted: get, list, watch pods (cluster-wide read-only)
Denied:    secrets access (ClusterRole does NOT include secrets)

AC verification:
  kubectl auth can-i list pods   --as=system:serviceaccount:terminus-portal:portal-sidecar-sa --all-namespaces → yes
  kubectl auth can-i list secrets --as=system:serviceaccount:terminus-portal:portal-sidecar-sa              → no
*/ -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal-sidecar-sa
  namespace: terminus-portal
  labels:
    {{- include "terminus-portal.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: portal-sidecar-pods-reader
  labels:
    {{- include "terminus-portal.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-sidecar-pods-reader-binding
  labels:
    {{- include "terminus-portal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: portal-sidecar-pods-reader
subjects:
  - kind: ServiceAccount
    name: portal-sidecar-sa
    namespace: terminus-portal
