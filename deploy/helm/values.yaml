replicaCount: 1

image:
  repository: ghcr.io/electricm0nk/terminus-portal
  pullPolicy: IfNotPresent
  tag: "latest"  # CI overrides with GITHUB_SHA on merge
  pullSecrets:
    - name: ghcr-pull-secret

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  host: portal.trantor.internal
  tls: []

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi

metricsExporter:
  image:
    repository: nginx/nginx-prometheus-exporter
    tag: "1.3.0"
  resources:
    requests:
      cpu: 5m
      memory: 8Mi
    limits:
      cpu: 50m
      memory: 32Mi

sidecar:
  image:
    repository: ghcr.io/electricm0nk/terminus-portal-sidecar
    tag: "latest"  # CI overrides with GITHUB_SHA on merge
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

prometheus:
  # URL of the Prometheus instance accessible from within the cluster
  url: "https://prometheus.trantor.internal"
  # PEM-encoded internal CA certificate for TLS verification.
  # If empty, no ConfigMap is created and the sidecar will log a warning.
  # Replace with the actual CA cert PEM for your cluster.
  caCertPem: ""
